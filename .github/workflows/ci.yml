name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: example-anon-key
      NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: example-anon-key
      SUPABASE_SERVICE_ROLE_KEY: example-service-role-key
      NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: example-google-maps-key
      GOOGLE_MAPS_API_KEY: example-google-maps-key
      NSW_API_KEY: example-nsw-api-key
      NSW_API_SECRET: example-nsw-api-secret
      NSW_OAUTH_URL: https://example.com/oauth
      NSW_LIQUOR_BASE_URL: https://example.com
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
